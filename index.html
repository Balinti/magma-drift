<script>
"use strict";
(() => {
// ─────────────────────────────────────────────
//  MAGMA DRIFT : HEATLINE
//  Single-file hyper-casual HTML5 canvas game
// ─────────────────────────────────────────────

// ── Canvas setup ──────────────────────────────
const CV = document.getElementById('c');
const ctx = CV.getContext('2d');
const WRAP = document.getElementById('game-wrap');

let W = 0, H = 0, DPR = 1;
function resize() {
  const r = WRAP.getBoundingClientRect();
  W = r.width; H = r.height;
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  CV.width  = Math.round(W * DPR);
  CV.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── Constants ─────────────────────────────────
const PLAYER_W   = 36;
const PLAYER_H   = 18;
const SHAFT_MARGIN = 28; // wall thickness
const BASE_SPEED = 130;  // px/s scroll speed
const MAX_SPEED  = 320;
const SPEED_RAMP = 18;   // px/s per second increase
const DRIFT_ACCEL  = 680;
const DRIFT_RETURN = 420;
const MAX_VX     = 220;
const TELEGRAPH_MS = 350;
const ERUPT_MS     = 550;
const COOLDOWN_MS  = 400;
const VENT_RADIUS_BASE = 28;
const GATE_H = 22;
const GATE_W = 70;
const HEAT_NEAR_GAIN = 0.22;
const HEAT_DECAY     = 0.06;
const MAX_HEAT       = 1.0;
const MAX_MULT       = 8;
const I_FRAMES_MS    = 1400;
const WOBBLE_MS      = 500;

// ── State ──────────────────────────────────────
let state  = 'start';
let score  = 0;
let hiScore = +localStorage.getItem('md_hi') || 0;
let heat   = 0;
let mult   = 1;
let lives  = 2;
let iTimer = 0;
let wobbleT= 0;
let scrollY= 0;
let elapsed= 0;
let shakeX = 0, shakeY = 0;
let shakeTimer = 0;
let blueWash = 0;
let hslHue = 0;
let pressed = false;

// ── Player ──────────────────────────────────────
const player = { x:0, y:0, vx:0, vy:0, angle:0 };

// ── Particles ──────────────────────────────────
const particles = [];
function spawnParticles(x, y, count, opts) {
  for (let i = 0; i < count && particles.length < 300; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = (opts.speed || 80) * (0.4 + Math.random() * 0.6);
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      life: 1,
      decay: opts.decay || (0.8 + Math.random() * 0.8),
      r: opts.r || (3 + Math.random() * 3),
      color: opts.color || `hsl(${20 + Math.random()*40},100%,${50+Math.random()*20}%)`,
      gravity: opts.gravity !== undefined ? opts.gravity : 60
    });
  }
}

// ── Vents / Gates ──────────────────────────────
// Vent states: 'telegraph','erupting','cooling','idle'
const vents = [];
const gates = [];

// ── Deterministic pattern system ───────────────
// Patterns: array of {lane,delay} (lane 0..3 = left..right quarters of shaft interior)
const PATTERNS = [
  [{lane:0,delay:0},{lane:2,delay:200}],
  [{lane:1,delay:0},{lane:3,delay:300}],
  [{lane:2,delay:0},{lane:0,delay:250},{lane:3,delay:500}],
  [{lane:1,delay:0}],
  [{lane:0,delay:0},{lane:1,delay:200},{lane:2,delay:400}],
  [{lane:3,delay:0},{lane:1,delay:150}],
  [{lane:0,delay:0},{lane:3,delay:350}],
  [{lane:2,delay:0},{lane:1,delay:300},{lane:0,delay:600}],
];
let patternIdx = 0;
let patternTimer = 0;
let patternPeriod = 2200; // ms between patterns, decreases over time
let pendingVents = []; // {lane, fireAt (elapsed ms)}
let nextGateScore = 400;

function laneX(lane) {
  const inner = W - SHAFT_MARGIN * 2;
  return SHAFT_MARGIN + (inner / 4) * lane + inner / 8;
}

function ventRadius() {
  return VENT_RADIUS_BASE + Math.min(elapsed / 60, 10);
}

function shaftWidth() {
  const narrow = Math.max(0, (elapsed - 45) / 60) * 18;
  return W - SHAFT_MARGIN * 2 - narrow;
}

function schedulePattern() {
  const pat = PATTERNS[patternIdx % PATTERNS.length];
  patternIdx++;
  const baseY = -80;
  pat.forEach(({lane, delay}) => {
    const spawnX = laneX(lane);
    pendingVents.push({
      x: spawnX,
      y: baseY,
      fireAt: elapsed * 1000 + delay
    });
  });
}

function spawnGate() {
  const inner = W - SHAFT_MARGIN * 2;
  const gx = SHAFT_MARGIN + inner * 0.5 - GATE_W * 0.5;
  gates.push({
    x: gx,
    y: -GATE_H - 10,
    w: GATE_W,
    h: GATE_H,
    passed: false
  });
  nextGateScore = score + 300 + Math.random() * 400;
}

// ── Shake ───────────────────────────────────────
function addShake(power) {
  shakeTimer = power * 0.5;
}

function updateShake(dt) {
  if (shakeTimer > 0) {
    shakeTimer = Math.max(0, shakeTimer - dt);
    const amp = shakeTimer * 14;
    shakeX = (Math.random() - 0.5) * amp;
    shakeY = (Math.random() - 0.5) * amp;
  } else {
    shakeX = 0; shakeY = 0;
  }
}

// ── Input ───────────────────────────────────────
CV.addEventListener('pointerdown', e => {
  e.preventDefault();
  pressed = true;
  if (state === 'start') startGame();
  else if (state === 'gameover') startGame();
});
CV.addEventListener('pointerup',   e => { e.preventDefault(); pressed = false; });
CV.addEventListener('pointercancel',e=>{ pressed = false; });

window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    pressed = true;
    if (state === 'start' || state === 'gameover') startGame();
  }
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space') pressed = false;
});

// ── Game lifecycle ──────────────────────────────
function startGame() {
  state   = 'playing';
  score   = 0;
  heat    = 0;
  mult    = 1;
  lives   = 2;
  iTimer  = 0;
  wobbleT = 0;
  shakeTimer = 0;
  elapsed = 0;
  scrollY = 0;
  blueWash = 0;
  hslHue = 0;
  particles.length = 0;
  vents.length = 0;
  gates.length = 0;
  pendingVents.length = 0;
  patternIdx = 0;
  patternTimer = 0;
  patternPeriod = 2200;
  nextGateScore = 400;
  pressed = false;

  player.x  = W / 2;
  player.y  = H * 0.72;
  player.vx = 0;
  player.vy = 0;
  player.angle = 0;

  document.body.classList.add('playing');
  schedulePattern();
}

function endGame() {
  state = 'gameover';
  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('md_hi', hiScore);
  }
  addShake(1.5);
  spawnParticles(player.x, player.y, 28, {speed:160, decay:0.7, r:5, color:'#ff4400', gravity:90});
  document.body.classList.remove('playing');
}

// ── Score display ───────────────────────────────
function addScore(pts) {
  score += Math.round(pts * mult);
}

// ── Update ───────────────────────────────────────
let lastT = 0;
function update(ts) {
  const dt = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;
  if (state !== 'playing') return;

  elapsed += dt;
  hslHue = (hslHue + dt * 20) % 360;

  // speed ramp
  const speed = Math.min(BASE_SPEED + elapsed * SPEED_RAMP, MAX_SPEED);

  // scroll
  scrollY += speed * dt;

  // pattern period shrinks
  patternPeriod = Math.max(1100, 2200 - elapsed * 14);

  // ── Player physics ──
  const shaftL = SHAFT_MARGIN;
  const shaftR = W - SHAFT_MARGIN - Math.max(0, (elapsed - 45) / 60) * 18;

  if (pressed) {
    player.vx += DRIFT_ACCEL * dt;
  } else {
    player.vx -= DRIFT_RETURN * dt;
  }
  player.vx = Math.max(-MAX_VX, Math.min(MAX_VX, player.vx));

  // wobble
  if (wobbleT > 0) {
    wobbleT = Math.max(0, wobbleT - dt);
    player.vx += Math.sin(wobbleT * 20) * 140 * (wobbleT / (WOBBLE_MS/1000));
  }

  player.x += player.vx * dt;
  player.x = Math.max(shaftL + PLAYER_W/2, Math.min(shaftR - PLAYER_W/2, player.x));

  // tilt
  player.angle = player.vx / MAX_VX * 0.35;

  // ── i-frames ──
  if (iTimer > 0) iTimer = Math.max(0, iTimer - dt * 1000);

  // ── Pattern spawn ──
  patternTimer += dt * 1000;
  if (patternTimer >= patternPeriod) {
    patternTimer = 0;
    schedulePattern();
  }

  // ── Pending vents → spawn ──
  const nowMs = elapsed * 1000;
  for (let i = pendingVents.length - 1; i >= 0; i--) {
    const pv = pendingVents[i];
    if (nowMs >= pv.fireAt) {
      spawnVentAt(pv.x, -80);
      pendingVents.splice(i, 1);
    }
  }

  // ── Vents update ──
  let nearMiss = false;
  for (let i = vents.length - 1; i >= 0; i--) {
    const v = vents[i];
    v.y += speed * dt;
    v.timer -= dt * 1000;

    if (v.state === 'telegraph' && v.timer <= 0) {
      v.state = 'erupting';
      v.timer = ERUPT_MS;
      v.totalTimer = ERUPT_MS;
    } else if (v.state === 'erupting') {
      if (v.timer <= 0) {
        v.state = 'cooling';
        v.timer = COOLDOWN_MS;
      } else {
        // collision check
        const dx = player.x - v.x;
        const dy = player.y - v.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const hitR = v.r + 12;
        const nearR = v.r + 38;

        if (dist < hitR && iTimer <= 0) {
          // hit!
          lives--;
          iTimer = I_FRAMES_MS;
          wobbleT = WOBBLE_MS / 1000;
          if (lives <= 0) {
            endGame();
            return;
          } else {
            addShake(0.9);
            mult = 1; heat = 0;
            spawnParticles(player.x, player.y, 18, {speed:130, decay:1.0, r:4, color:'#ff6600', gravity:80});
          }
        } else if (dist < nearR && dist >= hitR && !v.scored) {
          // near miss!
          v.scored = true;
          nearMiss = true;
          heat = Math.min(MAX_HEAT, heat + HEAT_NEAR_GAIN);
          addScore(15);
          spawnParticles(player.x, player.y, 8, {speed:60, decay:2, r:2, color:`hsl(${20+Math.random()*40},100%,60%)`, gravity:20});
        }
      }
    } else if (v.state === 'cooling' && v.timer <= 0) {
      vents.splice(i, 1);
      continue;
    }

    // remove off-screen
    if (v.y > H + 60) {
      vents.splice(i, 1);
    }
  }

  if (nearMiss) addShake(0.12);

  // ── Heat/Multiplier ──
  heat = Math.max(0, heat - HEAT_DECAY * dt);
  mult = Math.max(1, Math.min(MAX_MULT, Math.floor(1 + heat * (MAX_MULT - 1))));

  // score trickle
  addScore(speed * dt * 0.08);

  // ── Gates update ──
  if (score >= nextGateScore) spawnGate();

  for (let i = gates.length - 1; i >= 0; i--) {
    const g = gates[i];
    g.y += speed * dt;

    if (!g.passed) {
      const inX = player.x > g.x && player.x < g.x + g.w;
      const inY = player.y > g.y && player.y < g.y + g.h;
      if (inX && inY) {
        g.passed = true;
        const bonus = Math.round(100 * mult);
        addScore(100);
        blueWash = 0.7;
        heat = Math.max(0, heat - 0.3);
        spawnParticles(player.x, player.y, 20, {speed:90, decay:1.2, r:3, color:'#44ccff', gravity:20});
        spawnParticles(g.x + g.w/2, g.y + g.h/2, 14, {speed:70, decay:1.5, r:2.5, color:'#88eeff', gravity:10});
        addShake(0.15);
      }
    }
    if (g.y > H + 40) gates.splice(i, 1);
  }

  blueWash = Math.max(0, blueWash - dt * 1.8);

  // ── Particles ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x  += p.vx * dt;
    p.y  += p.vy * dt;
    p.vy += p.gravity * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  updateShake(dt);
}

// Helper: actual vent spawn at screen position
function spawnVentAt(x, y) {
  vents.push({
    x, y,
    r: ventRadius(),
    state: 'telegraph',
    timer: TELEGRAPH_MS,
    totalTimer: TELEGRAPH_MS,
    scored: false
  });
}

// ── Draw ─────────────────────────────────────────
function draw() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // background
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0d0200');
  bgGrad.addColorStop(1, '#200800');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // shaft walls
  const shaftR = W - SHAFT_MARGIN - Math.max(0, (elapsed - 45) / 60) * 18;
  drawWalls(shaftR);

  // lava floor scroll lines
  drawScrollLines();

  if (state === 'playing' || state === 'gameover') {
    // gates
    drawGates();
    // vents
    drawVents();
    // particles
    drawParticles();
    // player
    drawPlayer();
    // HUD
    drawHUD();
  }

  // blue wash overlay
  if (blueWash > 0) {
    ctx.fillStyle = `rgba(60,180,255,${blueWash * 0.25})`;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.restore();

  if (state === 'start') drawStart();
  if (state === 'gameover') drawGameOver();
}

function drawWalls(shaftR) {
  const t = elapsed;
  // left wall
  const lg = ctx.createLinearGradient(0, 0, SHAFT_MARGIN, 0);
  lg.addColorStop(0, '#3a0800');
  lg.addColorStop(0.6, '#1a0400');
  lg.addColorStop(1, '#220600');
  ctx.fillStyle = lg;
  ctx.fillRect(0, 0, SHAFT_MARGIN, H);
  // right wall
  const rg = ctx.createLinearGradient(shaftR, 0, W, 0);
  rg.addColorStop(0, '#220600');
  rg.addColorStop(0.4, '#1a0400');
  rg.addColorStop(1, '#3a0800');
  ctx.fillStyle = rg;
  ctx.fillRect(shaftR, 0, W - shaftR, H);

  // wall glow
  ctx.strokeStyle = `hsla(${(hslHue * 0.5) % 360},80%,45%,0.55)`;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(SHAFT_MARGIN, 0); ctx.lineTo(SHAFT_MARGIN, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(shaftR, 0); ctx.lineTo(shaftR, H); ctx.stroke();
}

function drawScrollLines() {
  const step = 60;
  const off = scrollY % step;
  ctx.strokeStyle = 'rgba(255,80,0,0.07)';
  ctx.lineWidth = 1;
  for (let y = -off; y < H; y += step) {
    ctx.beginPath(); ctx.moveTo(SHAFT_MARGIN, y); ctx.lineTo(W - SHAFT_MARGIN, y); ctx.stroke();
  }
}

function drawVents() {
  for (const v of vents) {
    const prog = v.timer / v.totalTimer;
    if (v.state === 'telegraph') {
      // crack glow
      const glow = Math.sin((1 - prog) * Math.PI) * 0.9 + 0.1;
      ctx.beginPath();
      ctx.arc(v.x, v.y, v.r * (0.5 + 0.5 * (1-prog)), 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,120,0,${glow * 0.5})`;
      ctx.fill();
      // crack lines
      ctx.strokeStyle = `rgba(255,200,0,${glow * 0.8})`;
      ctx.lineWidth = 1.5;
      for (let k = 0; k < 5; k++) {
        const a = (k / 5) * Math.PI * 2;
        const r1 = v.r * 0.3 * (1-prog);
        const r2 = v.r * (0.5 + 0.5*(1-prog));
        ctx.beginPath();
        ctx.moveTo(v.x + Math.cos(a)*r1, v.y + Math.sin(a)*r1);
        ctx.lineTo(v.x + Math.cos(a)*r2, v.y + Math.sin(a)*r2);
        ctx.stroke();
      }
    } else if (v.state === 'erupting') {
      // eruption main
      const pulse = 0.8 + 0.2 * Math.sin(elapsed * 40);
      const grad = ctx.createRadialGradient(v.x, v.y, 0, v.x, v.y, v.r * 1.4 * pulse);
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(0.2, '#ffee44');
      grad.addColorStop(0.5, '#ff6600');
      grad.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.beginPath();
      ctx.arc(v.x, v.y, v.r * 1.4 * pulse, 0, Math.PI*2);
      ctx.fillStyle = grad;
      ctx.fill();
      // danger ring
      ctx.beginPath();
      ctx.arc(v.x, v.y, v.r + 38, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,100,0,${0.15 + 0.1 * Math.sin(elapsed*20)})`;
      ctx.lineWidth = 1;
      ctx.stroke();
      // spawn lava sparks
      if (Math.random() < 0.35) {
        spawnParticles(v.x + (Math.random()-0.5)*v.r, v.y + (Math.random()-0.5)*v.r, 1, {
          speed:50, decay:2.5, r:2, color:`hsl(${10+Math.random()*30},100%,${55+Math.random()*20}%)`, gravity:50
        });
      }
    } else if (v.state === 'cooling') {
      const a = prog * 0.6;
      ctx.beginPath();
      ctx.arc(v.x, v.y, v.r * 0.9 * prog, 0, Math.PI*2);
      ctx.fillStyle = `rgba(180,60,0,${a})`;
      ctx.fill();
    }
  }
}

function drawGates() {
  for (const g of gates) {
    if (g.passed) continue;
    const cx = g.x + g.w/2;
    // blue steam ring
    const grad = ctx.createLinearGradient(g.x, 0, g.x + g.w, 0);
    grad.addColorStop(0, 'rgba(0,180,255,0)');
    grad.addColorStop(0.25, 'rgba(60,220,255,0.7)');
    grad.addColorStop(0.75, 'rgba(60,220,255,0.7)');
    grad.addColorStop(1, 'rgba(0,180,255,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(g.x, g.y, g.w, g.h);
    // label
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.round(10 * DPR / DPR)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(`x${mult} BANK`, cx, g.y + g.h/2 + 4);
    // animated edge glow
    const t2 = elapsed * 4;
    ctx.strokeStyle = `rgba(100,240,255,${0.5 + 0.4*Math.sin(t2)})`;
    ctx.lineWidth = 2;
    ctx.strokeRect(g.x, g.y, g.w, g.h);
  }
}

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);

  // i-frame flash
  const iFlash = iTimer > 0 && Math.floor(iTimer / 100) % 2 === 0;

  if (!iFlash) {
    // board glow
    const hue = (hslHue * 2) % 360;
    ctx.shadowColor = `hsl(${hue},100%,60%)`;
    ctx.shadowBlur = 14;

    // board body
    ctx.fillStyle = `hsl(${hue},80%,45%)`;
    ctx.beginPath();
    ctx.ellipse(0, 0, PLAYER_W/2, PLAYER_H/2, 0, 0, Math.PI*2);
    ctx.fill();

    // board highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.ellipse(-4, -3, PLAYER_W/2 - 10, PLAYER_H/2 - 4, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.shadowBlur = 0;
  } else {
    // outline flash
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(0, 0, PLAYER_W/2, PLAYER_H/2, 0, 0, Math.PI*2);
    ctx.stroke();
  }

  // lava trail
  ctx.restore();
  const trailCount = 5;
  for (let i = 0; i < trailCount; i++) {
    const frac = (i + 1) / trailCount;
    const tx = player.x - player.vx * 0.006 * frac * frac;
    const ty = player.y + frac * frac * 12;
    ctx.beginPath();
    ctx.arc(tx, ty, (1 - frac) * 5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,100,0,${(1-frac)*0.6})`;
    ctx.fill();
  }

  return;
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.1, p.r * p.life), 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // heat bar
  const barW = 120, barH = 8;
  const bx = W/2 - barW/2, by = 10;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(bx-1, by-1, barW+2, barH+2);
  const heatGrad = ctx.createLinearGradient(bx, 0, bx+barW, 0);
  heatGrad.addColorStop(0, '#ff6600');
  heatGrad.addColorStop(1, '#ffff00');
  ctx.fillStyle = heatGrad;
  ctx.fillRect(bx, by, barW * heat, barH);
  ctx.strokeStyle = 'rgba(255,100,0,0.6)';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, barW, barH);

  ctx.fillStyle = '#ff9944';
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('HEAT', bx, by + barH + 10);

  // multiplier
  if (mult > 1) {
    ctx.fillStyle = `hsl(${40 + mult * 8},100%,${50+mult*3}%)`;
    ctx.font = `bold ${14 + mult}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(`x${mult}`, W/2, by + barH + 18);
  }

  // score
  ctx.fillStyle = '#ffcc88';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(Math.floor(score), W - 10, 26);

  // hi score
  ctx.fillStyle = '#996644';
  ctx.font = '11px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(`BEST ${Math.floor(hiScore)}`, W - 10, 40);

  // lives
  for (let i = 0; i < 2; i++) {
    ctx.fillStyle = i < lives ? '#ff4400' : '#331100';
    ctx.beginPath();
    const hx = 14 + i * 18, hy = 16;
    ctx.arc(hx, hy, 6, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawStart() {
  // semi-dark overlay
  ctx.fillStyle = 'rgba(10,2,0,0.65)';
  ctx.fillRect(0, 0, W, H);

  const cx = W/2, cy = H/2;

  // title glow
  ctx.shadowColor = '#ff4400';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#ff6622';
  ctx.font = `bold ${Math.round(W*0.11)}px Arial Black,Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('MAGMA', cx, cy - 60);
  ctx.fillText('DRIFT', cx, cy - 10);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ff9944';
  ctx.font = `bold 16px Arial`;
  ctx.fillText('HEATLINE', cx, cy + 18);

  // animated pulse circle
  const pulse = 0.8 + 0.2*Math.sin(lastT*0.004);
  const grad = ctx.createRadialGradient(cx, cy+65, 0, cx, cy+65, 38*pulse);
  grad.addColorStop(0, 'rgba(255,140,0,0.9)');
  grad.addColorStop(0.5, 'rgba(255,60,0,0.5)');
  grad.addColorStop(1, 'rgba(255,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(cx, cy+65, 38*pulse, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#ffddaa';
  ctx.font = '15px Arial';
  ctx.fillText('Tap / Press SPACE to start', cx, cy + 108);

  ctx.fillStyle = '#886644';
  ctx.font = '12px Arial';
  ctx.fillText(`Best: ${Math.floor(hiScore)}`, cx, cy + 130);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(10,2,0,0.72)';
  ctx.fillRect(0, 0, W, H);

  const cx = W/2, cy = H*0.38;

  ctx.shadowColor = '#ff2200';
  ctx.shadowBlur = 25;
  ctx.fillStyle = '#ff4422';
  ctx.font = `bold ${Math.round(W*0.1)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', cx, cy);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ffcc88';
  ctx.font = 'bold 28px Arial';
  ctx.fillText(`${Math.floor(score)}`, cx, cy + 44);

  if (score >= hiScore && score > 0) {
    ctx.fillStyle = '#ffee44';
    ctx.font = 'bold 14px Arial';
    ctx.fillText('NEW BEST!', cx, cy + 66);
  } else {
    ctx.fillStyle = '#885533';
    ctx.font = '13px Arial';
    ctx.fillText(`Best: ${Math.floor(hiScore)}`, cx, cy + 66);
  }

  ctx.fillStyle = '#cc7733';
  ctx.font = '13px Arial';
  ctx.fillText(`Heatline x${mult} | Heat: ${Math.round(heat*100)}%`, cx, cy + 90);

  // Restart button
  const bx = cx - 80, by = cy + 110;
  ctx.fillStyle = '#aa3300';
  ctx.beginPath();
  ctx.roundRect(bx, by, 160, 38, 8);
  ctx.fill();
  ctx.fillStyle = '#ffddaa';
  ctx.font = 'bold 16px Arial';
  ctx.fillText('Play Again', cx, by + 24);

  // Share button
  const sx = cx - 70, sy = by + 52;
  ctx.fillStyle = '#224488';
  ctx.beginPath();
  ctx.roundRect(sx, sy, 140, 34, 8);
  ctx.fill();
  ctx.fillStyle = '#aaccff';
  ctx.font = '14px Arial';
  ctx.fillText('Share Score', cx, sy + 22);

  // store share button pos for click
  CV._shareBtn = {x:sx, y:sy, w:140, h:34};
  CV._restartBtn = {x:bx, y:by, w:160, h:38};
}

// ── Button hit detection ─────────────────────────
CV.addEventListener('pointerdown', e => {
  if (state !== 'gameover') return;
  const rect = CV.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);

  const rb = CV._restartBtn;
  if (rb && mx > rb.x && mx < rb.x+rb.w && my > rb.y && my < rb.y+rb.h) {
    startGame(); return;
  }
  const sb = CV._shareBtn;
  if (sb && mx > sb.x && mx < sb.x+sb.w && my > sb.y && my < sb.y+sb.h) {
    doShare(); return;
  }
});

function doShare() {
  const s = Math.floor(score);
  const url = `https://balinti.github.io/magma-drift/?challenge=${s}`;
  const text = `I scored ${s} in Magma Drift: Heatline! My x${mult} multiplier was on fire! Can you beat me? ${url}`;
  if (navigator.share) {
    navigator.share({ title: 'Magma Drift', text, url }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      alert('Score copied to clipboard!');
    }).catch(() => {
      prompt('Copy this:', text);
    });
  }
}

// ── Main loop ─────────────────────────────────────
function loop(ts) {
  lastT = lastT || ts;
  update(ts);
  draw();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

})();
</script>
</body>
